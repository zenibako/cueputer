; PlatformIO configuration for Cueputer
; Target: M5Stack Cardputer ADV (ESP32-S3)
[env:cardputer_adv]
platform = espressif32
board = m5stack-cardputer
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DARDUINO_M5STACK_CARDPUTER
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3

lib_deps =
    m5stack/M5Unified @ ^0.2.0
    m5stack/M5Cardputer @ ^1.1.0
    https://github.com/CNMAT/OSC.git#1.3.5
    https://github.com/max22-/ESP32-BLE-MIDI.git
    madhephaestus/ESP32Servo @ ^3.0.0
    bblanchon/ArduinoJson @ ^7.0.0

lib_ldf_mode = deep+

board_build.flash_mode = qio
board_build.f_flash = 80000000
board_build.partitions = default_8MB.csv

; Build and upload to device
; pio run -t upload
; Monitor: pio device monitor

; ——— Native tests (run on host, no hardware) ————————
[env:native]
platform = native
test_filter = native/*
build_flags = -std=c++17
